<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Member Dashboard | Nutrition Made Simple</title>
<meta name="robots" content="noindex, nofollow">
<meta name="description" content="The Nutrition Made Simple member dashboard.">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div class="proto-flag">✦ PROTOTYPE PREVIEW — this is the new MEMBER DASHBOARD (what a paying member sees after logging in). Every tab on the left works.</div>

<div class="dash">
  <aside class="dash-side">
    <a class="brand" href="index.html"><span class="mark">M</span> <span>Nutrition Made&nbsp;Simple</span></a>
    <nav class="dnav">
      <small>My Recipes</small>
      <button data-view="Breakfast"><span class="ico">🍳</span> Breakfast</button>
      <button data-view="Lunch"><span class="ico">🥗</span> Lunch</button>
      <button data-view="Dinner"><span class="ico">🍽</span> Dinner</button>
      <button data-view="All"><span class="ico">📖</span> All Recipes</button>
      <div class="sep"></div>
      <small>My Plan</small>
      <button data-view="program"><span class="ico">📊</span> My Program</button>
      <button data-view="progress"><span class="ico">📈</span> My Progress</button>
      <button data-view="saved"><span class="ico">❤</span> Saved Recipes</button>
      <button data-view="community"><span class="ico">👯</span> Community</button>
      <button data-view="subscription"><span class="ico">🧾</span> My Subscription</button>
      <div class="sep"></div>
      <button data-view="settings"><span class="ico">⚙</span> Settings</button>
      <button onclick="location.href='index.html'"><span class="ico">↩</span> Back to site</button>
    </nav>
  </aside>

  <main class="dash-main">
    <div class="dash-top">
      <div><h1>Welcome back, Sarah 🌿</h1><p class="sub">Here's everything you need to eat well this week.</p></div>
      <div class="avatar">S</div>
    </div>
    <div id="dashView"></div>
  </main>
</div>

<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
