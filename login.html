<!DOCTYPE html>
<html lang="en">
<head>

<body data-chrome="site" data-page="login.html">
<section style="min-height:74vh;display:grid;place-items:center"><div class="wrap" style="max-width:440px">
  <div class="form-card">
    <div style="text-align:center;margin-bottom:18px"><span class="brand" style="justify-content:center;font-size:1.3rem"><span class="mark">M</span></span><h2 style="margin-top:12px;font-size:1.7rem">Welcome back</h2><p class="lead" style="font-size:.95rem">Log in to your member dashboard.</p></div>

    <div style="display:grid;gap:12px"><input class="fld" value="sarah@email.com" readonly><input class="fld" type="password" value="demoaccess" readonly></div>

    <p style="text-align:center;font-size:.85rem;color:var(--muted);margin-top:14px">Not a member yet? <a href="membership.html" style="color:var(--green);font-weight:600">Join Nutrition Made Simple</a></p>
  </div>
